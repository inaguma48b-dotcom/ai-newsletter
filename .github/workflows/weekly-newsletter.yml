name: Weekly AI Newsletter

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ニュースレター送信
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python newsletter.py

      - name: バックナンバーをコミット
        run: |
          git config user.name "newsletter-bot"
          git config user.email "actions@github.com"
          git add archive/
          git diff --cached --quiet || git commit -m "archive: $(date +%Y-%m-%d) 号を追加"
          git push
